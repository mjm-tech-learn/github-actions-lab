name: Maven CI

on:
  push:
    branches:
      - main

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Application
        run: mvn clean install

      - name: Create Build File
        run: |
          echo "Build Complete" > build.txt

  Testing:
    runs-on: ubuntu-latest
    
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Execute Tests
        run: mvn test
      
      - name: Read Build File
        run: cat build.txt
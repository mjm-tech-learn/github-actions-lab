name: Build MF
on:
  push:
    branches:
      - main
  job:
    Build:
      runs-on: ubuntu-latest
      steps:
        - name: Code Checkouts
          uses: actions/checkout@v4

        - name: Maven Build
          run: mvn install
        
    Testing:
      runs-on: ubuntu-latest
      needs: Build
      steps:
        - name: Code Checkout
          uses: actions/checkout@v4

        - name: Maven Test runs on main branche
          run: mvn test

        - name: checkstyle
          run: mvn checkstyle:checkstyle